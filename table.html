<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Table 101 </title>
</head>
<body>
    <section id =simple-table>
        <h2>Simple Table</h2>
        <table border="1">  
            <thead>
                <!--A ROW-->
                <tr>
                    <!-- HEADING CELL-->
                    <th>ADM.NO.</th>
                    <th>Name</th>
                
                </tr>
                <td>1234</td>
                <td>John </td>
                <tr>
                    <td>5678</td>
                    <td> Doe</td>
                </tr>
            </thead>

        </table>
        </section>
        <section id="course-table">
            <h2>Course Table</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>Semester</th>
                        <th colspan="2">Course</th>
                    </tr>
                    <th></th>
                    <th>BBIT 1</th>
                    <th>BBIT 2</th>
                </thead>
                <tbody>
                    <tr>
                        <td rowspan="3">1</td>
                        <td>Prog</td>
                        <td>OOP</td>
                    </tr>
                    <tr>
                        <td>DB</td>
                        <td>WAD</td>
                    </tr>
                    <tr>
                        <td>Ethics</td>
                        <td>PA</td>
                    </tr>
                </tbody>
            </table>
        </section>

        </section>
        </body>



</html>
